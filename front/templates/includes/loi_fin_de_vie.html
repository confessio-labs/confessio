{% load custom_tags %}
{% now "Y-m-d" as today %}

{% if today <= "2026-07-15" %}
    <div class="row mb-3">
      <div class="col col-12 col-md-12 mx-auto">
              <div class="text-center alert alert-warning alert-dismissible fade show" role="alert">
                <span class="alert-inner--text"><span class="fw-bold">{% countdown_july_15 %} avant le vote de la loi sur la fin de vie 📆</span>
                    Priez pour un député <a class="link-info" style="text-decoration: underline;" href="https://priepourundepute.fr/">ici</a> 🙏🏻</span>
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
      </div>
    </div>
{% endif %}
