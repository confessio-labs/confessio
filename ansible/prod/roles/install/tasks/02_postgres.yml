##
# Set up and configure postgres
# Inspired by :
# - https://stormatics.tech/blogs/install-postgresql-using-ansible-on-remote-servers
# - https://gist.github.com/kharandziuk/d11aab8b1560d408032911140a0b103a

- name: Add the PostgreSQL GPG key as a keyring
  ansible.builtin.shell: |
    curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-pgdg.gpg
  args:
    creates: /usr/share/keyrings/postgresql-pgdg.gpg
  become: true

- name: Add the PostgreSQL PPA
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/postgresql-pgdg.gpg] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
  become: true

- name: Update apt cache
  apt:
    update_cache: yes
  become: true

- name: Install required packages
  apt:
    # postgresql-contrib-18 is now a virtual package provided by postgresql-18 (the contrib
    # modules ship inside the main server package), so it must not be listed/version-pinned here.
    name:
      - postgresql-18
      - postgresql-18-postgis-3
      - postgresql-18-pgvector
    state: latest
  become: true

- name: Start and enable postgres
  service: name=postgresql enabled=yes state=started
  become: true

- name: Modify listen_addresses in postgresql.conf to accept remote connection
  lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?listen_addresses = '.*'"
    line: "listen_addresses = '*'"
    state: present
  become: true
  notify:
    - restart postgres

- name: Optimize JIT settings to prevent overhead on small queries
  lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?{{ item.key }} = .*"
    line: "{{ item.key }} = {{ item.value }}"
    state: present
  become: true
  loop:
    - { key: 'jit_above_cost', value: '750000' }
    - { key: 'jit_inline_above_cost', value: '1000000' }
    - { key: 'jit_optimize_above_cost', value: '1000000' }
  notify:
    - restart postgres

- name: Configure a new postgresql user
  postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
  become_user: postgres
  become: true
  notify:
    - restart postgres

- name: Create database
  postgresql_db:
    name: "{{ db_name }}"
    owner: "{{ db_user }}"
  become_user: postgres
  become: true

- name: install postgis extension
  postgresql_ext:
    name: postgis
    db: "{{ db_name }}"
  become: true
  become_user: postgres

- name: install pgvector extension
  postgresql_ext:
    name: vector
    db: "{{ db_name }}"
  become: true
  become_user: postgres

- name: install unaccent extension
  postgresql_ext:
    name: unaccent
    db: "{{ db_name }}"
  become: true
  become_user: postgres

# Read-only role for the admin copilot SQL tool. SELECT-only; the role is the real safety
# barrier behind the copilot's raw-SQL tool.
- name: Configure the read-only copilot postgresql role
  postgresql_user:
    name: "{{ copilot_db_user }}"
    password: "{{ copilot_db_password }}"
    role_attr_flags: NOSUPERUSER,NOCREATEDB,NOCREATEROLE
  become_user: postgres
  become: true

- name: Grant CONNECT on the database to the copilot role
  postgresql_privs:
    db: "{{ db_name }}"
    type: database
    objs: "{{ db_name }}"
    roles: "{{ copilot_db_user }}"
    privs: CONNECT
  become_user: postgres
  become: true

- name: Grant USAGE on schema public to the copilot role
  postgresql_privs:
    db: "{{ db_name }}"
    type: schema
    objs: public
    roles: "{{ copilot_db_user }}"
    privs: USAGE
  become_user: postgres
  become: true

- name: Grant SELECT on all existing tables to the copilot role
  postgresql_privs:
    db: "{{ db_name }}"
    type: table
    schema: public
    objs: ALL_IN_SCHEMA
    roles: "{{ copilot_db_user }}"
    privs: SELECT
  become_user: postgres
  become: true

- name: Grant SELECT on future tables (default privileges) to the copilot role
  postgresql_privs:
    db: "{{ db_name }}"
    type: default_privs
    schema: public
    objs: TABLES
    roles: "{{ copilot_db_user }}"
    target_roles: "{{ db_user }}"
    privs: SELECT
  become_user: postgres
  become: true

- name: Enforce read-only + statement_timeout defaults on the copilot role
  community.postgresql.postgresql_query:
    db: "{{ db_name }}"
    query: "{{ item }}"
  loop:
    - "ALTER ROLE {{ copilot_db_user }} SET statement_timeout = '10s'"
    - "ALTER ROLE {{ copilot_db_user }} SET default_transaction_read_only = on"
  become_user: postgres
  become: true

- name: copy pg_hba.conf
  template:
    src: pg_hba.conf
    dest: /etc/postgresql/18/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: "0640"
  become: true
  notify:
    - restart postgres