upstream app_server {
    server 127.0.0.1:{{ wsgi_server_port }} fail_timeout=0;
}

add_header X-Content-Type-Options nosniff;
add_header X-XSS-Protection "1; mode=block";

# Catch all HTTPS requests with an invalid HOST header
server {
    listen 443 default_server;
    listen [::]:443 default_server;

    server_name  _; # some invalid name that won't match anything

    ssl_certificate         /etc/letsencrypt/live/{{ server_host }}/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/{{ server_host }}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/{{ server_host }}/fullchain.pem;

    return 444;
}

#
# HTTPS server
#
server {
    listen 443 ssl deferred;
    listen [::]:443 ssl deferred;

    server_name {{ server_host }};

    access_log /var/log/nginx/{{ app_name }}-access.log;
    error_log /var/log/nginx/{{ app_name }}-error.log info;

    client_max_body_size 10m;  # Max file size

    ssl on;
    ssl_certificate         /etc/letsencrypt/live/{{ server_host }}/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/{{ server_host }}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/{{ server_host }}/fullchain.pem;

    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 5m;
    ssl_stapling on;
    ssl_stapling_verify on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA:ECDHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA256:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA:ECDHE-RSA-DES-CBC3-SHA:EDH-RSA-DES-CBC3-SHA:AES256-GCM-SHA384:AES128-GCM-SHA256:AES256-SHA256:AES128-SHA256:AES256-SHA:AES128-SHA:DES-CBC3-SHA:HIGH:!aNULL:!eNULL:!EXPORT:!DES:!MD5:!PSK:!RC4";

    ssl_dhparam /etc/nginx/dhparams.pem;
    ssl_prefer_server_ciphers on;

    # --- Next.js front (proxied to the node process on 127.0.0.1:{{ front_port }}) ---
    # Page routes
    location = / {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }
    location ^~ /diocese/ {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }
    location ^~ /church/ {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }
    location = /sitemap.xml {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }
    # Exact matches, so Django keeps /api/docs, /api/openapi.json, etc.
    location = /api/health {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }
    location = /api/revalidate-dioceses {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }
    # Next build assets / RSC payloads / image optimization, and the PostHog rewrite.
    location ^~ /_next/ {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }
    location ^~ /ingest/ {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }
    # Root-level static files from the Next public/ dir (favicon.svg, logos, robots.txt,
    # the google site-verification .html, ...). Single path segment only -> never matches
    # /static/... (multi-segment) or extension-less Django routes (/contact, /front/api/...).
    location ~ ^/[^/]+\.(svg|png|jpe?g|gif|ico|webp|txt|xml|json|webmanifest|html|map)$ {
        include /etc/nginx/snippets/{{ app_name }}-front-proxy.conf;
    }

    # path for staticfiles
    location /static {
         autoindex on;
         alias {{ static_root }};
    }

    # everything else -> Django (gunicorn)
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;

        if (!-f $request_filename) {
            proxy_pass http://app_server;
            break;
        }
    }
}