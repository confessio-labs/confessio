upstream front_server {
    server 127.0.0.1:{{ front_port }} fail_timeout=0;
}

#
# HTTPS server (Next.js front)
#
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name {{ front_server_host }};

    access_log /var/log/nginx/{{ front_app_name }}-access.log;
    error_log /var/log/nginx/{{ front_app_name }}-error.log info;

    client_max_body_size 10m;

    ssl_certificate         /etc/letsencrypt/live/{{ front_server_host }}/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/{{ front_server_host }}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/{{ front_server_host }}/fullchain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/nginx/dhparams.pem;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://front_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
