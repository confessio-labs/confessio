##
# Retire the temp.confessio.fr vhost: the front is now served under confessio.fr
# (coliving in the Django vhost). This removes the temp vhost, its cert-renewal cron,
# and the now-unused Let's Encrypt certificate.
##
- name: Disable the temp front https vhost
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/{{ front_app_name }}
    state: absent
  become: true
  notify:
    - restart nginx

- name: Disable the temp front http vhost
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/{{ front_app_name }}-http
    state: absent
  become: true
  notify:
    - restart nginx

- name: Remove the temp front vhost configs
  ansible.builtin.file:
    path: "/etc/nginx/sites-available/{{ item }}"
    state: absent
  loop:
    - "{{ front_app_name }}"
    - "{{ front_app_name }}-http"
  become: true
  notify:
    - restart nginx

- name: Remove the temp cert-renewal cron
  ansible.builtin.cron:
    name: letsencrypt_renewal_front
    state: absent

- name: Check whether the retired temp cert still exists
  ansible.builtin.stat:
    path: /etc/letsencrypt/renewal/{{ front_server_host }}.conf
  register: temp_cert_conf
  become: true

- name: Delete the retired temp Let's Encrypt certificate
  ansible.builtin.command: certbot delete -n --cert-name {{ front_server_host }}
  become: true
  when: temp_cert_conf.stat.exists
